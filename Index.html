<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostChat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a35;
    --accent: #7cffd4;
    --accent-dim: rgba(124,255,212,0.12);
    --accent-glow: rgba(124,255,212,0.25);
    --red: #ff5f6d;
    --text: #e8e8f0;
    --muted: #666680;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,255,212,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }

  /* ---- SCREENS ---- */
  .screen { display: none; animation: fadeUp 0.35s ease forwards; }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- LOGO ---- */
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .logo-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 40px;
  }

  /* ---- CARD ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }

  .card-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ---- INPUTS ---- */
  label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 16px;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  /* ---- BUTTONS ---- */
  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn-primary:hover { background: #9fffde; box-shadow: 0 0 20px var(--accent-glow); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .btn-ghost:hover { color: var(--text); border-color: #444455; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- STATUS ---- */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.green { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.yellow { background: #f7c948; box-shadow: 0 0 6px #f7c948; }
  .status-dot.red { background: var(--red); }

  /* ---- CHAT SCREEN ---- */
  #chat-screen {
    height: 100vh;
    display: none;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
    padding: 0;
    width: 100%;
  }
  #chat-screen.active {
    display: flex;
    animation: fadeUp 0.35s ease forwards;
  }

  .chat-header {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  .chat-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
  }

  .chat-header-left { display: flex; flex-direction: column; gap: 3px; }
  .chat-room-name {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .chat-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .chat-header-right { display: flex; align-items: center; gap: 10px; }

  .enc-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 4px 9px;
    border-radius: 20px;
    border: 1px solid rgba(124,255,212,0.2);
    letter-spacing: 0.08em;
  }

  .leave-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .leave-btn:hover { color: var(--red); border-color: var(--red); }

  /* ---- MESSAGES ---- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: msgIn 0.2s ease forwards;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }
  .msg.system { align-self: center; align-items: center; max-width: 100%; }

  .msg-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.06em;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.mine .msg-bubble {
    background: var(--accent);
    color: #0a0a0f;
    border-bottom-right-radius: 3px;
    font-weight: 500;
  }
  .msg.theirs .msg-bubble {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .msg.system .msg-bubble {
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  /* ---- INPUT BAR ---- */
  .input-bar {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    line-height: 1.4;
  }
  #msg-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  #msg-input::placeholder { color: var(--muted); }
  #msg-input:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .send-btn:hover { background: #9fffde; box-shadow: 0 0 16px var(--accent-glow); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { color: #0a0a0f; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ---- WAITING STATE ---- */
  .waiting-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  .waiting-overlay.show { display: flex; }
  .waiting-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    position: relative;
  }
  .waiting-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }
  .waiting-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .waiting-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .room-code-display {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--text);
    letter-spacing: 0.25em;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .room-code-display:hover { border-color: var(--accent); }
  .copy-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    background: rgba(255,95,109,0.1);
    border: 1px solid rgba(255,95,109,0.2);
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 12px;
    display: none;
    letter-spacing: 0.06em;
  }

  /* Responsive */
  @media (max-width: 500px) {
    #chat-screen { max-width: 100%; }
    .msg { max-width: 88%; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- LANDING SCREEN -->
  <div id="landing-screen" class="screen active">
    <div class="logo">
      <span class="logo-dot"></span>
      GhostChat
    </div>
    <div class="logo-sub">// end-to-end encrypted · zero identity · ephemeral</div>

    <div class="card">
      <div class="card-title">// Identify yourself</div>
      <label for="username-input">Username</label>
      <input type="text" id="username-input" placeholder="enter a name..." maxlength="24" autocomplete="off" spellcheck="false">

      <div class="divider">choose action</div>

      <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
      <button class="btn btn-ghost" onclick="showJoinScreen()">Join Room</button>

      <div id="landing-error" class="error-msg"></div>
    </div>

    <div class="status-bar">
      <span class="status-dot yellow" id="peer-status-dot"></span>
      <span id="peer-status-text">Connecting to relay...</span>
    </div>
  </div>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen">
    <div class="logo">
      <span class="logo-dot"></span>
      GhostChat
    </div>
    <div class="logo-sub">// joining a room</div>

    <div class="card">
      <div class="card-title">// Enter room code</div>
      <label for="room-code-input">Room Code</label>
      <input type="text" id="room-code-input" placeholder="e.g. XKCD42" maxlength="12" autocomplete="off" spellcheck="false" style="text-transform:uppercase; letter-spacing:0.15em;">

      <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
      <button class="btn btn-ghost" onclick="showScreen('landing-screen')">← Back</button>

      <div id="join-error" class="error-msg"></div>
    </div>
  </div>

</div>

<!-- CHAT SCREEN (full page) -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-room-name" id="chat-room-label"># ------</div>
      <div class="chat-meta" id="chat-meta-label">connecting...</div>
    </div>
    <div class="chat-header-right">
      <div class="enc-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        E2E
      </div>
      <button class="leave-btn" onclick="leaveChat()">Leave</button>
    </div>
  </div>

  <div id="messages"></div>

  <div class="input-bar">
    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" spellcheck="false" disabled onkeydown="handleKeyDown(event)">
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- WAITING OVERLAY -->
<div class="waiting-overlay" id="waiting-overlay">
  <div class="waiting-card">
    <div class="spinner"></div>
    <div class="waiting-title">Waiting for peer</div>
    <div class="waiting-desc">Share this room code with the person you want to chat with.</div>
    <div class="room-code-display" id="display-room-code" onclick="copyRoomCode()">------</div>
    <div class="copy-hint">// tap to copy</div>
    <button class="btn btn-ghost" style="margin-top:0;" onclick="leaveChat()">Cancel</button>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let peer = null;
let conn = null;
let myUsername = '';
let myRoomCode = '';
let isHost = false;
let sharedKey = null; // AES-GCM key after ECDH
let myECDH = null;    // Our ECDH key pair
let peerPublicKey = null;
let peerReady = false;

// ============================================================
// PEER SETUP
// ============================================================
function initPeer(id) {
  peer = new Peer(id, {
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:global.stun.twilio.com:3478' }
      ]
    }
  });

  peer.on('open', (peerId) => {
    updateStatus('green', 'Relay connected');
  });

  peer.on('error', (err) => {
    console.error('Peer error:', err);
    if (err.type === 'peer-unavailable') {
      showError('join-error', 'Room not found. Check the code and try again.');
      showScreen('join-screen');
    } else {
      updateStatus('red', 'Connection error');
    }
  });

  peer.on('connection', (c) => {
    if (conn) { c.close(); return; } // one connection only
    setupConnection(c);
  });
}

function setupConnection(c) {
  conn = c;

  conn.on('open', async () => {
    // Send our ECDH public key + username
    const pubKeyExported = await crypto.subtle.exportKey('raw', myECDH.publicKey);
    const pubKeyB64 = arrayBufferToBase64(pubKeyExported);
    conn.send(JSON.stringify({ type: 'handshake', pubKey: pubKeyB64, username: myUsername }));
  });

  conn.on('data', async (raw) => {
    let data;
    try { data = JSON.parse(raw); } catch { return; }

    if (data.type === 'handshake') {
      // Receive peer's public key and derive shared AES key
      peerPublicKey = data.pubKey;
      const peerPubKeyBytes = base64ToArrayBuffer(data.pubKey);
      const peerPubKey = await crypto.subtle.importKey(
        'raw', peerPubKeyBytes,
        { name: 'ECDH', namedCurve: 'P-256' },
        false, []
      );
      const rawShared = await crypto.subtle.deriveBits(
        { name: 'ECDH', public: peerPubKey },
        myECDH.privateKey, 256
      );
      sharedKey = await crypto.subtle.importKey(
        'raw', rawShared,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );

      // Acknowledge
      conn.send(JSON.stringify({ type: 'handshake-ack', username: myUsername }));
      peerReady = true;
      onChatReady(data.username);

    } else if (data.type === 'handshake-ack') {
      peerReady = true;
      onChatReady(data.username);

    } else if (data.type === 'msg') {
      if (!sharedKey) return;
      try {
        const iv = base64ToArrayBuffer(data.iv);
        const ct = base64ToArrayBuffer(data.ct);
        const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
        const text = new TextDecoder().decode(plainBuf);
        appendMessage(data.from, text, 'theirs');
      } catch(e) {
        console.error('Decrypt failed', e);
      }

    } else if (data.type === 'leave') {
      appendSystemMessage(`${data.from} left the chat.`);
      disableInput();
    }
  });

  conn.on('close', () => {
    appendSystemMessage('Peer disconnected.');
    disableInput();
  });

  conn.on('error', (err) => {
    console.error('Conn error:', err);
  });
}

// ============================================================
// CRYPTO HELPERS
// ============================================================
async function generateECDH() {
  return await crypto.subtle.generateKe
